<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monster Chase: The Great Escape</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
font-family: 'Press Start 2P', monospace;
overflow: hidden;
}

.game-container {
position: relative;
border: 4px solid #22c55e;
border-radius: 8px;
box-shadow:
0 0 30px rgba(34, 197, 94, 0.4),
0 0 60px rgba(34, 197, 94, 0.2),
inset 0 0 30px rgba(0, 0, 0, 0.5);
}

canvas {
display: block;
background: #1e293b;
}

.ui-overlay {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
pointer-events: none;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
}

.start-screen, .game-over-screen {
background: rgba(15, 23, 42, 0.95);
padding: 40px;
border-radius: 8px;
text-align: center;
border: 3px solid #22c55e;
box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
}

.hidden {
display: none !important;
}

h1 {
color: #22c55e;
font-size: 24px;
margin-bottom: 20px;
text-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
line-height: 1.5;
}

h2 {
color: #ef4444;
font-size: 20px;
margin-bottom: 15px;
text-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
}

p {
color: #f8fafc;
font-size: 12px;
margin-bottom: 10px;
line-height: 1.8;
}

.instructions {
color: #94a3b8;
font-size: 10px;
margin-top: 20px;
}

.blink {
animation: blink 1s infinite;
}

@keyframes blink {
0%, 50% { opacity: 1; }
51%, 100% { opacity: 0; }
}

.score-display {
color: #fbbf24;
font-size: 14px;
margin-top: 10px;
}

.high-score {
color: #22c55e;
font-size: 12px;
}

.perk-notification {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
color: #22c55e;
font-size: 20px;
text-shadow: 0 0 20px rgba(34, 197, 94, 0.8);
opacity: 0;
transition: opacity 0.3s, transform 0.3s;
pointer-events: none;
z-index: 100;
}

.perk-notification.show {
opacity: 1;
transform: translate(-50%, -50%) scale(1.1);
}
</style>
</head>
<body>
<div class="game-container">
<canvas id="gameCanvas" width="800" height="400"></canvas>

<div class="ui-overlay" id="startScreen">
<div class="start-screen">
<h1>MONSTER CHASE<br>The Great Escape</h1>
<p>Escape from the Green Monster!</p>
<p class="instructions">Use UP/DOWN or W/S to dodge traps</p>
<p class="blink" style="margin-top: 30px; color: #22c55e;">Press ENTER to Start</p>
</div>
</div>

<div class="ui-overlay hidden" id="gameOverScreen">
<div class="game-over-screen">
<h2>GAME OVER!</h2>
<p id="finalScore">Score: 0</p>
<p class="high-score" id="highScore">Best: 0</p>
<p class="blink" style="margin-top: 25px; color: #22c55e;">Press ENTER to Retry</p>
</div>
</div>

<div class="perk-notification" id="perkNotification"></div>
</div>

// ============================================
// SPRITE ANIMATOR CLASS
// ============================================
class SpriteAnimator {
  constructor(config) {
    this.config = config;
    this.image = null;
    this.ready = false;
    this.currentAnim = config.defaultAnim;
    this.frame = 0;
    this.elapsed = 0;       // ms since last frame advance
    this.playOnce = false;  // true → revert to defaultAnim after finishing
    this.revertTo = config.defaultAnim;

    if (config.url) {
      const img = new Image();
      img.onload = () => { this.image = img; this.ready = true; };
      img.src = config.url;
    }
  }

  // Switch animation. If once=true it plays through once then reverts.
  play(animName, once = false) {
    if (!this.config.animations[animName]) return;
    if (this.currentAnim === animName && !once) return;
    this.currentAnim = animName;
    this.frame = 0;
    this.elapsed = 0;
    this.playOnce = once;
  }

  update(deltaTime) {
    if (!this.ready) return;
    const anim = this.config.animations[this.currentAnim];
    if (!anim) return;

    this.elapsed += deltaTime;
    const msPerFrame = 1000 / anim.fps;
    if (this.elapsed >= msPerFrame) {
      this.elapsed -= msPerFrame;
      this.frame++;
      if (this.frame >= anim.frames) {
        if (this.playOnce) {
          this.playOnce = false;
          this.play(this.revertTo);
        } else {
          this.frame = 0;
        }
      }
    }
  }

  // Draw the current frame at (x, y) scaled to (w, h).
  // Pass flipX=true to mirror horizontally.
  draw(ctx, x, y, w, h, flipX = false) {
    if (!this.ready || !this.image) return false;
    const anim = this.config.animations[this.currentAnim];
    if (!anim) return false;

    const fw = this.config.frameWidth;
    const fh = this.config.frameHeight;
    const startFrame = anim.startFrame || 0;
    const sx = (startFrame + this.frame) * fw;
    const sy = (anim.row || 0) * fh;

    ctx.save();
    if (flipX) {
      ctx.translate(x + w, y);
      ctx.scale(-1, 1);
      ctx.drawImage(this.image, sx, sy, fw, fh, 0, 0, w, h);
    } else {
      ctx.drawImage(this.image, sx, sy, fw, fh, x, y, w, h);
    }
    ctx.restore();
    return true;
  }
}

    this.monsterAngry = true;

    // Trigger monster angry animation
    monsterAnimator.play('angry');

    // Lunge toward player
    monster.lunge();

    // Reset angry state after a short time
    setTimeout(() => {
        this.monsterAngry = false;
        monsterAnimator.play('idle');
    }, 1500);
},

update() {
    if (this.screenShake > 0) this.screenShake--;
    if (this.redOverlay > 0) this.redOverlay--;
},

getShakeOffset() {
    if (this.screenShake > 0) {
        return {
            x: (Math.random() - 0.5) * this.screenShakeIntensity,
            y: (Math.random() - 0.5) * this.screenShakeIntensity
        };
    }
    return { x: 0, y: 0 };
}
};

// LIFE SYSTEM
// ============================================
const lifeSystem = {
maxLives: 2,
currentLives: 2,
immunityTimer: 0,
immunityDuration: 3000, // 3 seconds
recoveryTimer: 0,
recoveryDuration: 30000, // 30 seconds
isInvulnerable: false,

update(deltaTime) {
    // Update immunity timer
    if (this.immunityTimer > 0) {
        this.immunityTimer -= deltaTime;
        this.isInvulnerable = true;
    } else {
        this.immunityTimer = 0;
        this.isInvulnerable = false;
    }

    // Update recovery timer when on last life
    if (this.currentLives === 1 && !this.isInvulnerable) {
        this.recoveryTimer += deltaTime;
        if (this.recoveryTimer >= this.recoveryDuration) {
            this.regainLife();
        }
    }
},

takeDamage() {
    if (this.isInvulnerable) return false;

    this.currentLives--;
    this.immunityTimer = this.immunityDuration;
    this.recoveryTimer = 0;

    // Trigger damage effects
    damageEffects.trigger();

    return true;
},

regainLife() {
    if (this.currentLives < this.maxLives) {
        this.currentLives++;
        this.recoveryTimer = 0;
    }
},

reset() {
    this.currentLives = this.maxLives;
    this.immunityTimer = 0;
    this.recoveryTimer = 0;
    this.isInvulnerable = false;
},

isOnLastLife() {
    return this.currentLives === 1;
}
};

// ============================================
// MYSTERY BOX SYSTEM
// ============================================
const MYSTERY_BOX_CONFIG = {
spawnScoreInterval: 100,
duration: 20000, // 20 seconds
width: 35,
height: 35,
speed: 2.5, // Slower than obstacles so it's catchable
yPosition: 150
};

const PERKS = {
DOUBLE_SCORE: 'doubleScore',
SET_LIFE_TO_ONE: 'setLifeToOne',
TEMPORARY_IMMUNITY: 'temporaryImmunity',
RESURRECTION: 'resurrection'
};

const PERK_NAMES = {
[PERKS.DOUBLE_SCORE]: '2X SCORE',
[PERKS.SET_LIFE_TO_ONE]: 'DANGER',
[PERKS.TEMPORARY_IMMUNITY]: 'IMMUNITY',
[PERKS.RESURRECTION]: 'RESURRECTION'
};

const PERK_COLORS = {
[PERKS.DOUBLE_SCORE]: '#22c55e',
[PERKS.SET_LIFE_TO_ONE]: '#22c55e',
[PERKS.TEMPORARY_IMMUNITY]: '#22c55e',
[PERKS.RESURRECTION]: '#22c55e'
};

const mysteryBox = {
active: false,
x: 0,
y: 0,
timer: 0,
currentPerk: null,
scoreAtActivation: 0,
hasResurrection: false,
spawnedAtScore: 0,

spawn() {
    this.active = true;
    this.x = canvas.width + 50;
    this.y = MYSTERY_BOX_CONFIG.yPosition;
    this.spawnedAtScore = score;
},

collect() {
    const perkValues = Object.values(PERKS);
    this.currentPerk = perkValues[Math.floor(Math.random() * perkValues.length)];
    this.timer = MYSTERY_BOX_CONFIG.duration;
    this.active = false;

    // Apply perk immediately
    this.applyPerk(this.currentPerk);

    // Show prominent notification
    showPerkNotification(PERK_NAMES[this.currentPerk] || this.currentPerk, PERK_COLORS[this.currentPerk] || '#22c55e');
},

applyPerk(perk) {
    switch(perk) {
        case PERKS.DOUBLE_SCORE:
            // Handled in score update
            break;
        case PERKS.SET_LIFE_TO_ONE:
            if (lifeSystem.currentLives > 1) {
                lifeSystem.currentLives = 1;
                lifeSystem.immunityTimer = lifeSystem.immunityDuration;
            }
            break;
        case PERKS.TEMPORARY_IMMUNITY:
            lifeSystem.immunityTimer = Math.max(lifeSystem.immunityTimer, lifeSystem.immunityDuration);
            break;
        case PERKS.RESURRECTION:
            this.hasResurrection = true;
            break;
    }
},

update(deltaTime) {
    // Move mystery box from right to left (slower than obstacles)
    if (this.active) {
        this.x -= MYSTERY_BOX_CONFIG.speed;
        if (this.x + MYSTERY_BOX_CONFIG.width < 0) {
            this.active = false;
        }
    }

    // Update perk timer
    if (this.timer > 0) {
        this.timer -= deltaTime;
        if (this.timer <= 0) {
            this.deactivatePerk();
        }
    }
},

deactivatePerk() {
    this.timer = 0;
    this.currentPerk = null;
    this.hasResurrection = false;
},

getScoreMultiplier() {
    return (this.currentPerk === PERKS.DOUBLE_SCORE && this.timer > 0) ? 2 : 1;
},

checkResurrection() {
    if (this.hasResurrection) {
        this.hasResurrection = false;
        return true;
    }
    return false;
},

reset() {
    this.active = false;
    this.timer = 0;
    this.currentPerk = null;
    this.hasResurrection = false;
    this.spawnedAtScore = 0;
},

shouldSpawn(currentScore) {
    const scoreSinceLastSpawn = currentScore - this.spawnedAtScore;
    return scoreSinceLastSpawn >= MYSTERY_BOX_CONFIG.spawnScoreInterval;
}
};

// ============================================

const monster = {
x: 30,
y: 200,
width: 110,
height: 125,
baseX: 30,
color: '#22c55e',
bobOffset: 0,
mouthOpen: false,
isAngry: false,
lungeTimer: 0,       // counts down during lunge
lungeTargetX: 30,    // x to lunge toward
lungeStartX: 30,     // x at start of lunge

update(deltaTime) {
    // Smoothly follow player's Y position
    const targetY = player.y + player.height / 2 - this.height / 2;
    this.y += (targetY - this.y) * 0.04;

    // Bobbing animation on top of tracked position
    this.bobOffset = Math.sin(frameCount * 0.1) * 10;

    // Lunge toward player when angry, stop safely before touching
    if (this.lungeTimer > 0) {
        this.lungeTimer -= deltaTime;
        const t = Math.max(0, this.lungeTimer / 600);
        const progress = 1 - t * t;
        this.x = this.lungeStartX + (this.lungeTargetX - this.lungeStartX) * progress;
    } else {
        this.x = this.baseX;
        this.lungeTimer = 0;
    }

    // Angry animation when player takes damage
    if (damageEffects.monsterAngry) {
        this.isAngry = true;
        this.bobOffset = Math.sin(frameCount * 0.3) * 15;
    } else {
        this.isAngry = false;
    }

    this.mouthOpen = this.isAngry || Math.sin(frameCount * 0.15) > 0;
},

lunge() {
    // Target: stop 20px behind player's left edge
    const safeTargetX = player.x - this.width - 20;
    this.lungeStartX = this.baseX;
    this.lungeTargetX = Math.max(this.baseX + 30, safeTargetX);
    this.lungeTimer = 600; // ms
}
};

// Game Functions
function startGame() {
currentState = GAME_STATE.PLAYING;
document.getElementById('startScreen').classList.add('hidden');
document.getElementById('gameOverScreen').classList.add('hidden');
score = 0;
gameSpeed = 2.5;
obstacles = [];

// Reset all systems
lifeSystem.reset();
mysteryBox.reset();
player.y = 200;
player.velocityY = 0;
frameCount = 0;

// Reset damage effects
damageEffects.screenShake = 0;
damageEffects.redOverlay = 0;
damageEffects.monsterAngry = false;

// Reset perk notification
perkNotificationText = '';
perkNotificationTimer = 0;
perkNotificationVisible = false;
}

function resetGame() {
startGame();
}

function gameOver() {
currentState = GAME_STATE.GAME_OVER;

if (score > highScore) {
    highScore = score;
    localStorage.setItem('monsterChaseHighScore', highScore);
}

document.getElementById('finalScore').textContent = `Score: ${Math.floor(score)}`;
document.getElementById('highScore').textContent = `Best: ${Math.floor(highScore)}`;
document.getElementById('gameOverScreen').classList.remove('hidden');
}

function playerHit() {
const damageTaken = lifeSystem.takeDamage();
if (!damageTaken) return false;

// Play hurt animation once then revert
characterAnimator.revertTo = 'run';
characterAnimator.play('hurt', true);

if (lifeSystem.currentLives <= 0) {
    // Check for resurrection
    if (mysteryBox.checkResurrection()) {
        lifeSystem.currentLives = 1;
        lifeSystem.immunityTimer = lifeSystem.immunityDuration;
        showPerkNotification('RESURRECTED!', '#06b6d4');
        return false;
    }
    gameOver();
    return true;
}
return false;
}

function updatePlayer() {
if (keys.up) {
    player.velocityY = -player.speed;
} else if (keys.down) {
    player.velocityY = player.speed;
} else {
    player.velocityY *= 0.8;
}

player.y += player.velocityY;

// Drive character animation
const moving = Math.abs(player.velocityY) > 0.5;
if (!characterAnimator.playOnce) {
    characterAnimator.play(moving ? 'run' : 'idle');
}

// Boundary checks
if (player.y < 10) {
    player.y = 10;
}
if (player.y + player.height > canvas.height - 10) {
    player.y = canvas.height - 10 - player.height;
}
}

function updateMonster(deltaTime) {
monster.update(deltaTime);
}

function updateObstacles() {
// Spawn new obstacles
if (frameCount % obstacleConfig.spawnInterval === 0) {
    spawnObstacle();
}

// Update existing obstacles
for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= gameSpeed;

    // Remove off-screen obstacles
    if (obstacles[i].x + obstacles[i].width < 0) {
        obstacles.splice(i, 1);
    }
}
}

function updateMysteryBox(deltaTime) {
mysteryBox.update(deltaTime);

// Check if should spawn new mystery box
if (mysteryBox.shouldSpawn(score)) {
    mysteryBox.spawn();
}
}

function updateBackground() {
// Scroll background image right-to-left, looping
bgScrollX -= gameSpeed * 0.5;
if (bgScrollX <= -canvas.width) bgScrollX += canvas.width;

for (let star of stars) {
    star.x -= star.speed * (gameSpeed / 4);
    if (star.x < 0) {
        star.x = canvas.width;
        star.y = Math.random() * canvas.height;
    }
}
}

function checkCollisions() {
if (lifeSystem.isInvulnerable) return false;

// Check obstacle collisions
for (let obstacle of obstacles) {
    if (
        player.x < obstacle.x + obstacle.width &&
        player.x + player.width > obstacle.x &&
        player.y < obstacle.y + obstacle.height &&
        player.y + player.height > obstacle.y
    ) {
        return true;
    }
}

// Check monster collision
const monsterHitbox = {
    x: monster.x + 10,
    y: monster.y + monster.bobOffset + 10,
    width: monster.width - 20,
    height: monster.height - 20
};

if (
    player.x < monsterHitbox.x + monsterHitbox.width &&
    player.x + player.width > monsterHitbox.x &&
    player.y < monsterHitbox.y + monsterHitbox.height &&
    player.y + player.height > monsterHitbox.y
) {
    return true;
}

return false;
}

function checkMysteryBoxCollision() {
if (!mysteryBox.active) return false;

if (
    player.x < mysteryBox.x + MYSTERY_BOX_CONFIG.width &&
    player.x + player.width > mysteryBox.x &&
    player.y < mysteryBox.y + MYSTERY_BOX_CONFIG.height &&
    player.y + player.height > mysteryBox.y
) {
    mysteryBox.collect();
    return true;
}
return false;
}

function drawBackground() {
if (IMG.background && IMG.background.complete && IMG.background.naturalWidth > 0) {
    // Draw two copies to create seamless loop scrolling right-to-left
    const bw = canvas.width;
    const bh = canvas.height;
    // bgScrollX goes from 0 down to -canvas.width, then loops
    const offset = ((bgScrollX % bw) + bw) % bw; // always positive 0..bw
    // First tile
    ctx.drawImage(IMG.background, offset, 0, bw, bh);
    // Second tile (wraps around)
    ctx.drawImage(IMG.background, offset - bw, 0, bw, bh);
    return;
}

// Default drawn background
ctx.fillStyle = '#1e293b';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Draw stars/particles
ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
for (let star of stars) {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
}

// Ground lines
ctx.strokeStyle = '#334155';
ctx.lineWidth = 2;
for (let i = 0; i < 5; i++) {
    let y = 80 + i * 70;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
}
}

function drawDamageOverlay() {
if (damageEffects.redOverlay > 0) {
    const alpha = damageEffects.redOverlay / 20 * 0.4;
    ctx.fillStyle = `rgba(239, 68, 68, ${alpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}
}

function drawPerkNotification() {
if (perkNotificationVisible && perkNotificationTimer > 0) {
    const fadeFrames = 30;
    const alpha = Math.min(1, perkNotificationTimer / fadeFrames);

    const boxWidth = 320;
    const boxHeight = 70;
    const boxX = canvas.width / 2 - boxWidth / 2;
    const boxY = canvas.height / 2 - boxHeight / 2 - 50;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Terminal green screen background
    ctx.fillStyle = '#001a00';
    ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

    // Scanline effect
    ctx.fillStyle = 'rgba(0,255,0,0.04)';
    for (let sy = boxY; sy < boxY + boxHeight; sy += 4) {
        ctx.fillRect(boxX, sy, boxWidth, 2);
    }

    // Green border with glow
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 12;
    ctx.strokeStyle = '#22c55e';
    ctx.lineWidth = 2;
    ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
    ctx.shadowBlur = 0;

    // Corner brackets like terminal UI
    const cLen = 12;
    ctx.strokeStyle = '#4ade80';
    ctx.lineWidth = 3;
    // top-left
    ctx.beginPath(); ctx.moveTo(boxX, boxY + cLen); ctx.lineTo(boxX, boxY); ctx.lineTo(boxX + cLen, boxY); ctx.stroke();
    // top-right
    ctx.beginPath(); ctx.moveTo(boxX + boxWidth - cLen, boxY); ctx.lineTo(boxX + boxWidth, boxY); ctx.lineTo(boxX + boxWidth, boxY + cLen); ctx.stroke();
    // bottom-left
    ctx.beginPath(); ctx.moveTo(boxX, boxY + boxHeight - cLen); ctx.lineTo(boxX, boxY + boxHeight); ctx.lineTo(boxX + cLen, boxY + boxHeight); ctx.stroke();
    // bottom-right
    ctx.beginPath(); ctx.moveTo(boxX + boxWidth - cLen, boxY + boxHeight); ctx.lineTo(boxX + boxWidth, boxY + boxHeight); ctx.lineTo(boxX + boxWidth, boxY + boxHeight - cLen); ctx.stroke();

    // ">> PERK OBTAINED:" label
    ctx.fillStyle = '#4ade80';
    ctx.font = '8px "Press Start 2P", monospace';
    ctx.textAlign = 'left';
    ctx.fillText('>> PERK OBTAINED:', boxX + 12, boxY + 18);

    // Main perk name — bright green, glowing
    ctx.shadowColor = '#22c55e';
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(perkNotificationText, canvas.width / 2, boxY + 52);
    ctx.shadowBlur = 0;

    ctx.restore();

    perkNotificationTimer--;
    if (perkNotificationTimer <= 0) {
        perkNotificationVisible = false;
    }
}
}

function drawPlayer() {
ctx.save();

// Flash effect when invulnerable
if (lifeSystem.isInvulnerable && Math.floor(frameCount / 5) % 2 === 0) {
    ctx.globalAlpha = 0.5;
}

// Try sprite animator first, fallback to drawn character
// Apply green tint if perk is active
if (mysteryBox.currentPerk) {
    ctx.globalAlpha = Math.min(ctx.globalAlpha, 1);
    // Draw sprite then overlay green tint
    characterAnimator.draw(ctx, player.x, player.y, player.width, player.height);
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(34, 197, 94, 0.5)';
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.globalCompositeOperation = 'source-over';
} else {
    const drawnBySprite = characterAnimator.draw(ctx, player.x, player.y, player.width, player.height);
    if (!drawnBySprite) {
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2;
        ctx.strokeRect(player.x, player.y, player.width, player.height);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(player.x + 18, player.y + 6, 6, 6);
        ctx.fillRect(player.x + 24, player.y + 6, 4, 4);
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(player.x + 22, player.y + 8, 3, 3);
        ctx.fillRect(player.x + 26, player.y + 8, 2, 2);
    }
}

ctx.restore();
}

function drawMonster() {
const mx = monster.x;
const my = monster.y + monster.bobOffset;

// Try sprite animator first
if (monsterAnimator.ready) {
    ctx.save();
    if (monster.isAngry || damageEffects.monsterAngry) {
        ctx.filter = 'sepia(1) saturate(5) hue-rotate(-10deg) brightness(1.2)';
    }
    monsterAnimator.draw(ctx, mx, my, monster.width, monster.height);
    ctx.restore();
    return;
}

// Determine monster color based on angry state
let monsterColor = monster.color;
let outlineColor = '#16a34a';
let eyeColor = '#ef4444';

if (monster.isAngry || damageEffects.monsterAngry) {
    monsterColor = '#dc2626'; // Red when angry
    outlineColor = '#991b1b';
    eyeColor = '#fbbf24'; // Yellow glowing eyes
}

// Monster body
ctx.fillStyle = monsterColor;
ctx.fillRect(mx, my, monster.width, monster.height);

// Monster outline
ctx.strokeStyle = outlineColor;
ctx.lineWidth = 3;
ctx.strokeRect(mx, my, monster.width, monster.height);

// Eyes
ctx.fillStyle = '#ffffff';
ctx.fillRect(mx + 35, my + 15, 15, 15);
ctx.fillRect(mx + 45, my + 12, 12, 12);

// Angry pupils
ctx.fillStyle = eyeColor;
if (monster.isAngry || damageEffects.monsterAngry) {
    // More intense eyes when angry
    ctx.fillRect(mx + 40, my + 15, 8, 8);
    ctx.fillRect(mx + 50, my + 13, 6, 6);
} else {
    ctx.fillRect(mx + 42, my + 17, 5, 5);
    ctx.fillRect(mx + 50, my + 15, 4, 4);
}

// Mouth - wider when angry
if (monster.mouthOpen) {
    ctx.fillStyle = '#7f1d1d';
    const mouthWidth = monster.isAngry ? 30 : 25;
    const mouthHeight = monster.isAngry ? 25 : 20;
    ctx.fillRect(mx + 25, my + 40, mouthWidth, mouthHeight);
    // Teeth
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(mx + 25, my + 40, 10, 7);
    ctx.fillRect(mx + 45, my + 40, 10, 7);
} else {
    ctx.fillStyle = '#7f1d1d';
    ctx.fillRect(mx + 30, my + 45, 25, 10);
}

// Horns - more intense when angry
const hornColor = monster.isAngry ? '#dc2626' : '#16a34a';
ctx.fillStyle = hornColor;
ctx.beginPath();
ctx.moveTo(mx + 10, my);
ctx.lineTo(mx + 15, my - (monster.isAngry ? 20 : 15));
ctx.lineTo(mx + 20, my);
ctx.fill();

ctx.beginPath();
ctx.moveTo(mx + 40, my);
ctx.lineTo(mx + 45, my - (monster.isAngry ? 20 : 15));
ctx.lineTo(mx + 50, my);
ctx.fill();
}

function drawObstacles() {
for (let obstacle of obstacles) {
    const category = obstacle.category;

ctx.fillStyle = '#22c55e';
ctx.textAlign = 'right';

    ctx.lineWidth = 2;

    ctx.textAlign = 'center';
    ctx.fillText('RECOVERY', canvas.width / 2, barY - 5);

function update(deltaTime) {
if (currentState !== GAME_STATE.PLAYING) return;

frameCount++;
score += 0.1 * mysteryBox.getScoreMultiplier();

// Gradually increase speed (slightly faster)
if (frameCount % 250 === 0 && gameSpeed < 14) {
    gameSpeed += 0.5;
}

// Decrease spawn interval as speed increases
if (frameCount % 400 === 0 && obstacleConfig.spawnInterval > 40) {
    obstacleConfig.spawnInterval -= 5;

lifeSystem.update(deltaTime);
damageEffects.update();
mysteryBox.update(deltaTime);
updatePlayer();
updateMonster(deltaTime);
updateObstacles();
updateMysteryBox(deltaTime);
updateBackground();

characterAnimator.update(deltaTime);
monsterAnimator.update(deltaTime);

if (checkMysteryBoxCollision()) {
    // Mystery box collected
}

if (checkCollisions()) {
    playerHit();
}
}

function draw() {
ctx.save();

if (shake.x !== 0 || shake.y !== 0) {
    ctx.translate(shake.x, shake.y);
}

drawBackground();

if (currentState === GAME_STATE.PLAYING || currentState === GAME_STATE.GAME_OVER) {

    drawMysteryBox();
    drawPlayer();
    drawMonster();
    drawHUD();

requestAnimationFrame(gameLoop);

        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
</html>
